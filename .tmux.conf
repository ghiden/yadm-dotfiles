set -g default-terminal "screen-256color"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# status bar style
setw -g window-status-style fg=colour232,bg=default
setw -g window-status-current-style fg=colour255,bg=colour22,bold

# active pane style
set -g pane-active-border-style bg=green,fg=green
set -g pane-border-style fg=green

# enable mouse: (mac) hold option while dragging your mouse
set -g mouse on

# for vi user, this is a must
set-window-option -g mode-keys vi

# set the buffer to very big
set -g history-limit 50000

# move between panes just like vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Update default binding of `Enter` to also use copy-pipe
unbind-key -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# Bind ']' to use pbpaste
bind ] run "pbpaste | tmux load-buffer - && tmux paste-buffer"

